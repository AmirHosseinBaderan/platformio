name: Download and Commit Release File

on:
  push:
    branches:
      - main  # Adjust if your default branch is different
  release:
    types: [published]

# Add write permissions to allow the action to push commits
permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download file from release URL
        run: |
          RELEASE_URL="https://github.com/microsoft/vscode-cpptools/releases/download/v1.32.1/cpptools-linux-arm64.vsix"
          LOCAL_FILE_NAME="cpptools-linux-arm64.vsix"

          echo "Downloading file from: $RELEASE_URL"
          wget -O "$LOCAL_FILE_NAME" "$RELEASE_URL"
          echo ":white_check_mark: File downloaded: $LOCAL_FILE_NAME"

      - name: Configure Git
        run: |
          # Use a bot-like identity for commits pushed by actions
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add, Commit, and Push file
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }} # Use the PAT for pushing
        run: |
          set -e
          LOCAL_FILE_NAME="cpptools-linux-arm64.vsix"

          echo ":mag: Checking if file exists..."
          if [ ! -f "$LOCAL_FILE_NAME" ]; then
            echo ":x: File not found: $LOCAL_FILE_NAME"
            exit 1
          fi

          echo ":open_file_folder: Adding file to commit..."
          git add "$LOCAL_FILE_NAME"

          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo ":information_source: No changes to commit."
          else
            echo ":memo: Committing changes..."
            # Customize commit message as needed
            git commit -m "Add cpptools-linux-arm64.vsix"

            echo ":rocket: Pushing changes to repository..."
            # Use the GITHUB_TOKEN (your PAT) for authentication
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
            echo ":white_check_mark: Push completed successfully."
          fi
