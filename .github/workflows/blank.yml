name: Download and Commit Release File

on:
  push:
    branches:
      - main # Or your default branch like 'master'
  release:
    types: [published] # Trigger when a new release is published

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use the default GITHUB_TOKEN for checkout if not pushing with a PAT

      - name: Download file from release URL
        run: |
          RELEASE_URL="https://github.com/platformio/platformio-vscode-ide/releases/download/v3.3.4/platformio-ide-3.3.4.vsix"
          LOCAL_FILE_NAME="platformio-ide-3.3.4.vsix"

          echo "Downloading file from: $RELEASE_URL"
          wget -O "$LOCAL_FILE_NAME" "$RELEASE_URL"
          echo "File downloaded successfully to $LOCAL_FILE_NAME"

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Add, Commit, and Push file
        run: |
          # Add the downloaded file to be tracked by Git
          git add . # Replace with the actual file name you downloaded

          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Commit the changes
            git commit -m "Add downloaded file from release v1.0.0" # Customize commit message

            # Push the changes to the repository
            # Use a personal access token if you need to push to a different repo or with different permissions
            # Otherwise, the default GITHUB_TOKEN might have push permissions depending on your repo settings
            git push origin HEAD:${{ github.ref_name }}
          fi
