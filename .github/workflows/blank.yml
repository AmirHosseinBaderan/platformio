name: Download and Commit Release File

on:
  push:
    branches:
      - main  # Adjust if your default branch is different
  release:
    types: [published]

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download file from release URL
        run: |
          RELEASE_URL="https://github.com/MatsuriDayo/nekoray/releases/download/4.0.1/nekoray-4.0.1-2024-12-12-debian-x64.deb"
          LOCAL_FILE_NAME="nekoray-4.0.1-2024-12-12-debian-x64.deb"

          echo "Downloading file from: $RELEASE_URL"
          wget -O "$LOCAL_FILE_NAME" "$RELEASE_URL"
          echo ":white_check_mark: File downloaded: $LOCAL_FILE_NAME"

      - name: Split file if larger than 100 MB
        run: |
          LOCAL_FILE_NAME="cpptools-linux-x64.vsix"
          MAX_SIZE_MB=100
          SPLIT_SIZE_MB=90

          if [ ! -f "$LOCAL_FILE_NAME" ]; then
            echo ":x: File not found: $LOCAL_FILE_NAME"
            exit 1
          fi

          # Get file size in MB (rounded up)
          FILE_SIZE_MB=$(du -m "$LOCAL_FILE_NAME" | cut -f1)
          echo "File size is ${FILE_SIZE_MB} MB"

          if [ "$FILE_SIZE_MB" -le "$MAX_SIZE_MB" ]; then
            echo ":information_source: File size <= ${MAX_SIZE_MB} MB, no split needed."
            echo "SPLIT_MODE=false" >> $GITHUB_ENV
          else
            echo ":warning: File size > ${MAX_SIZE_MB} MB, splitting into ${SPLIT_SIZE_MB} MB parts..."

            BASENAME="${LOCAL_FILE_NAME%.*}"   
            EXTENSION="${LOCAL_FILE_NAME##*.}" 
            TARGET_DIR="$BASENAME"

            mkdir -p "$TARGET_DIR"

            # split into 90MB chunks: x00, x01, ...
            split -b "${SPLIT_SIZE_MB}m" -d -a 3 "$LOCAL_FILE_NAME" "${TARGET_DIR}/${BASENAME}."

            # Optionally give a nicer extension to each part (not strictly required)
            # for f in ${TARGET_DIR}/${BASENAME}.*; do
            #   mv "$f" "${f}.part"
            # done

            # Remove original large file so we don't commit it
            rm "$LOCAL_FILE_NAME"

            echo ":white_check_mark: Split completed. Chunks stored in folder: $TARGET_DIR"

            echo "SPLIT_MODE=true" >> $GITHUB_ENV
            echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add, Commit, and Push file or parts
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }} # Use the PAT for pushing
        run: |
          set -e
          LOCAL_FILE_NAME="cpptools-linux-x64.vsix"

          echo ":mag: Preparing files for commit..."

          if [ "${SPLIT_MODE}" = "true" ]; then
            echo ":open_file_folder: Adding split parts from folder: ${TARGET_DIR}"
            if [ -z "$TARGET_DIR" ] || [ ! -d "$TARGET_DIR" ]; then
              echo ":x: Target directory for split files not found: ${TARGET_DIR}"
              exit 1
            fi
            git add "${TARGET_DIR}"
          else
            echo ":open_file_folder: Adding original file: ${LOCAL_FILE_NAME}"
            if [ ! -f "$LOCAL_FILE_NAME" ]; then
              echo ":x: File not found: $LOCAL_FILE_NAME"
              exit 1
            fi
            git add "$LOCAL_FILE_NAME"
          fi

          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo ":information_source: No changes to commit."
          else
            if [ "${SPLIT_MODE}" = "true" ]; then
              COMMIT_MSG="Add split parts of ${LOCAL_FILE_NAME} (>100MB) into folder ${TARGET_DIR}"
            else
              COMMIT_MSG="Add ${LOCAL_FILE_NAME}"
            fi

            echo ":memo: Committing changes..."
            git commit -m "$COMMIT_MSG"

            echo ":rocket: Pushing changes to repository..."
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:"${{ github.ref_name }}"
            echo ":white_check_mark: Push completed successfully."
          fi
